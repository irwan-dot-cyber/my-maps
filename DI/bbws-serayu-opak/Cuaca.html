<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Climate Smart Irrigation Dashboard — BBWS Serayu Opak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="../../assets/LogoPUPR.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root{
      --bg:#0b1222; --text:#e5e7eb; --muted:#cbd5e1; --muted-2:#94a3b8;
      --survey:#0d47a1; --accent:#1d5fd1; --panel:rgba(11,18,34,.94);
      --border:rgba(255,255,255,.12); --hdrH:86px; --radius:12px;
      --aman:#22c55e; --waspada:#facc15; --siaga:#f97316; --kritis:#dc2626;
    }
    html, body {height:100%; margin:0; font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:var(--text)}
    .header{position:fixed; top:0; left:0; right:0; z-index:900; background:linear-gradient(90deg,#0d47a1,#123a7b); border-bottom:1px solid rgba(255,255,255,.18); padding:8px 12px; display:flex; align-items:center; gap:10px; box-shadow:0 6px 18px rgba(13,71,161,.25)}
    .header img{height:44px}.header .text{flex:1; color:#fff}.header .title{font-weight:800; font-size:13px; line-height:1.3}.header .subtitle{font-weight:600; font-size:11px; color:rgba(255,255,255,.9); margin-top:2px}
    .btn-home,.btn-link{background:#fff; color:var(--survey); font-weight:800; padding:6px 10px; border-radius:10px; text-decoration:none; font-size:11px; white-space:nowrap; border:none; cursor:pointer}.btn-link{background:#0f172a;color:#e5e7eb;border:1px solid rgba(255,255,255,.18)}
    .spacer{height:var(--hdrH)}#map{height:calc(100vh - var(--hdrH)); position:relative; z-index:1;}
    .dock{position:fixed; left:0; right:0; bottom:0; background:var(--panel); border-top:1px solid var(--border); max-height:50vh; padding:8px 12px; box-shadow:0 -10px 22px rgba(0,0,0,.28); z-index:950; backdrop-filter:blur(6px); display:flex; flex-direction:column; gap:6px; transition:max-height .2s ease, padding .2s ease; overflow:auto;}
    .dock-header{display:flex; align-items:center; justify-content:space-between; gap:8px}.dock-header h2{font-size:14px; margin:0; font-weight:800; color:#fff}.dock-toggle{background:rgba(15,23,42,.9); border:1px solid var(--border); border-radius:999px; color:#e5e7eb; font-size:11px; padding:2px 10px; cursor:pointer}.dock.collapsed{max-height:40px; overflow:hidden}.dock.collapsed .dock-body{display:none}
    .grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px}label{font-size:11px; color:var(--muted)}select,input[type="file"]{width:100%; box-sizing:border-box; padding:8px 10px; font-size:12px; background:rgba(255,255,255,.06); color:#fff; border:1px solid var(--border); border-radius:var(--radius); outline:none}option{color:#000;background:#fff}
    .row{display:grid; grid-template-columns:1fr auto 1fr auto 1fr auto; gap:8px; font-size:12px; color:var(--muted)}.row b{color:#fff}.err{color:#fca5a5; font-size:11px; margin-top:4px}.meta{font-size:12px; border-collapse:collapse; width:100%; color:var(--text)}.meta td{border-bottom:1px dashed rgba(255,255,255,.08); padding:4px 2px}.key{color:var(--muted-2); width:42%}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0}.card{border:1px solid var(--border);background:rgba(15,23,42,.92);border-radius:12px;padding:8px}.card .k{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em}.card .v{font-size:16px;font-weight:800;margin-top:2px}.card .s{font-size:10px;color:#cbd5e1;margin-top:2px}.risk-pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800;color:#07111f}.risk-aman{background:var(--aman)}.risk-waspada{background:var(--waspada)}.risk-siaga{background:var(--siaga);color:#fff}.risk-kritis{background:var(--kritis);color:#fff}
    .di-label{background:rgba(255,255,255,.9); border:1px solid #d1d5db; padding:2px 6px; border-radius:6px; font-size:11px; color:#111}.badge-irwan{position:fixed; right:12px; bottom:92px; z-index:1200; background:rgba(13,71,161,.85); border:1px solid rgba(255,255,255,.25); color:#fff; font-size:11px; font-weight:700; padding:5px 10px; border-radius:10px; box-shadow:0 0 10px rgba(13,71,161,.6); backdrop-filter:blur(6px)}.badge-irwan span{color:#FFD700}
    .layer-legend,.source-panel{background:rgba(15,23,42,.95); color:#f9fafb; padding:6px 8px; border-radius:6px; border:1px solid rgba(148,163,184,.6); font-size:11px; min-width:150px}.item{display:flex;align-items:center;gap:5px;margin:4px 0}.swatch{width:12px;height:12px;border-radius:3px;border:1px solid rgba(255,255,255,.7)}.swatch-di{background:#3388ff}.swatch-saluran{background:#10b981}.swatch-bendung{background:#f59e0b}.swatch-climate{background:#dc2626}.myloc-btn{width:32px;height:32px;border:none;background:rgba(15,23,42,.96);color:#e5e7eb;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px}
    .upload-card,.upload-list-card{margin-top:8px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:rgba(15,23,42,.92)}.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800;cursor:pointer}.btn-mini{background:#1e293b;border:none;border-radius:999px;color:#e5e7eb;font-size:10px;padding:2px 6px;margin-left:4px;cursor:pointer}.btn-mini.danger{background:#b91c1c}.upload-list{margin-top:4px;max-height:120px;overflow:auto;font-size:11px}.upload-item{display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px dashed rgba(148,163,184,.4)}.upload-name{flex:1;margin-right:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    @media(max-width:760px){:root{--hdrH:96px}.grid,.cards{grid-template-columns:1fr}.row{grid-template-columns:1fr auto}.header img{height:38px}.btn-home{display:none}}
  </style>
</head>
<body>
  <div class="header">
    <img src="../../assets/LogoPUPR.png" alt="Logo PU"/>
    <div class="text">
      <div class="title">Kementerian PU</div>
      <div class="subtitle">Ditjen SDA · Dit. Irigasi &amp; Rawa</div>
      <div class="subtitle">Climate Smart Irrigation · <b>BBWS Serayu Opak</b></div>
    </div>
    <button id="btnRefreshClimate" class="btn-link">Refresh Iklim</button>
    <a href="../../si-irwan.html" class="btn-home">Beranda</a>
  </div>
  <div class="spacer"></div>
  <div id="map"></div>

  <div class="dock" id="dock">
    <div class="dock-header"><h2>Dashboard Daerah Irigasi + Risiko Iklim</h2><button id="dockToggle" class="dock-toggle">Ciutkan</button></div>
    <div class="dock-body">
      <div class="cards" id="climateCards"></div>
      <div class="grid">
        <div><label for="diSel">Pilih Daerah Irigasi</label><select id="diSel"><option value="">— Semua —</option></select></div>
        <div><label for="clusterSel">Cluster Informasi GAS</label><select id="clusterSel"><option value="__ALL__">— Semua —</option></select></div>
        <div><label for="riskSel">Filter Risiko Iklim</label><select id="riskSel"><option value="__ALL__">— Semua —</option><option value="AMAN">AMAN</option><option value="WASPADA">WASPADA</option><option value="SIAGA">SIAGA</option><option value="KRITIS">KRITIS</option></select></div>
      </div>
      <div id="msg" class="err"></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:8px 0"/>
      <div id="stats" class="row"></div>
      <div id="detail" style="margin-top:6px;font-size:12px"></div>
      <div class="upload-card">
        <label for="geojsonFile">Upload GeoJSON / JSON → simpan ke Google Drive</label>
        <input type="file" id="geojsonFile" accept=".geojson,.json,application/json"/>
        <button type="button" id="btnUpload" class="btn-primary">Upload &amp; Simpan</button>
        <div id="uploadMsg" style="font-size:11px;margin-top:4px"></div>
      </div>
      <div class="upload-list-card">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#cbd5e1"><span>GeoJSON tersimpan</span><span style="font-size:10px;color:#64748b">Tampil / Hapus</span></div>
        <div id="uploadList" class="upload-list"><div style="color:#94a3b8;font-size:11px">Memuat daftar dari Google Drive...</div></div>
      </div>
    </div>
  </div>

  <div class="badge-irwan"><span>Si-Irwan v1.0</span></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const PATHS = {
      DI: "./LuasBaku_SerayuOpak_3.geojson",
      SALURAN: "./Saluran_SerayuOpak.geojson",
      BENDUNG: "./contoh_bendung.geojson",
      // Hasil olahan GEE/GAS per DI. Bisa berupa JSON lokal atau endpoint Apps Script.
      // Format minimal lihat fungsi normalizeClimate().
      CLIMATE_LOCAL: "./climate_di_serayu_opak.json"
    };

    const GAS_URL = "https://script.google.com/macros/s/AKfycbybsLoQu-8S-MlR_kB2989FZV0C-c1gRzUqcIZWBWuYb-_We03B_BShX8Q3AQqWhOTvzg/exec?sheet=SO_Integrasi&t=" + Date.now();
    const UPLOAD_URL = "https://script.google.com/macros/s/AKfycbxmAjYwQ1yj6Zkq0zZoLTNR3WjcByqJJ-3sL6Kj1WDEi5iK1qjxNe81YYGRCSADJ1BkHQ/exec";

    // Ganti URL ini dengan endpoint GAS/GEE kamu kalau sudah ada.
    // Endpoint disarankan menarik CHIRPS, SMAP, NDVI, dan ENSO, lalu mengembalikan nilai rata-rata per Kd_Inf.
    const CLIMATE_API = "";

    const BBWS_NAME = "BBWS Serayu Opak";
    const SOURCE_LINKS = {
      bmkg: "https://iklim.bmkg.go.id/id/enso/",
      bmkgEnsoIod: "https://cews.bmkg.go.id/dashboard-custom/monitoring-ENSO/",
      noaaOni: "https://www.cpc.ncep.noaa.gov/products/analysis_monitoring/ensostuff/ONI_v5.php",
      chirps: "https://www.chc.ucsb.edu/data/chirps",
      geeChirps: "https://developers.google.com/earth-engine/datasets/catalog/UCSB-CHG_CHIRPS_DAILY",
      smap: "https://smap.jpl.nasa.gov/data/"
    };

    const BENDUNG_SAMPLE = {"type":"FeatureCollection","features":[{"type":"Feature","properties":{"Nama Aset":"Bendung Papah","Kd_Inf":"SO-0001","Sungai":"Opak"},"geometry":{"type":"Point","coordinates":[110.4472,-7.9074]}},{"type":"Feature","properties":{"Nama Aset":"Bendung Progo Hilir","Kd_Inf":"SO-0002","Sungai":"Progo"},"geometry":{"type":"Point","coordinates":[110.2340,-7.6550]}}]};

    const $ = id => document.getElementById(id);
    const diSel=$('diSel'), clusterSel=$('clusterSel'), riskSel=$('riskSel'), statsEl=$('stats'), detailEl=$('detail'), msgEl=$('msg'), climateCards=$('climateCards');
    const uploadInput=$('geojsonFile'), uploadBtn=$('btnUpload'), uploadMsg=$('uploadMsg'), uploadListEl=$('uploadList');
    const note = m => msgEl.textContent = m || "";

    const map = L.map('map').setView([-7.8,110.3],8);
    const imagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'Tiles © Esri, Maxar, Earthstar Geographics' }).addTo(map);
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap contributors' });
    const layerCtl = L.control.layers({"Imagery":imagery,"OSM":osm}, null, {collapsed:true, position:'topright'}).addTo(map);

    map.createPane('diPane'); map.getPane('diPane').style.zIndex = 410;
    map.createPane('saluranPane'); map.getPane('saluranPane').style.zIndex = 420;
    map.createPane('bendungPane'); map.getPane('bendungPane').style.zIndex = 430;

    let lookup={}, rows=[], groups={}, headers=[];
    let diLayer, saluranLayer, bendungLayer, climateOverlayLayer;
    let diIndex=[];
    let climateByKey={};
    const labelLayer=L.layerGroup().addTo(map);
    const savedLayers={}; let savedFilesMeta=[];
    let myLocMarker=null, myLocCircle=null;

    const getNamaDI = o => o?.Nama_DI || o?.["Nama Aset"] || o?.["Nama DI"] || o?.nama_infrastruktur || "";
    const normKey = v => String(v || "").trim();
    const fmt = (v, suffix="") => (v===undefined || v===null || v==="") ? "-" : `${v}${suffix}`;

    function riskClass(status){
      const s=String(status||'AMAN').toUpperCase();
      if(s.includes('KRITIS')) return 'risk-kritis';
      if(s.includes('SIAGA')) return 'risk-siaga';
      if(s.includes('WASPADA')) return 'risk-waspada';
      return 'risk-aman';
    }
    function riskColor(status){
      const s=String(status||'AMAN').toUpperCase();
      if(s.includes('KRITIS')) return '#dc2626';
      if(s.includes('SIAGA')) return '#f97316';
      if(s.includes('WASPADA')) return '#facc15';
      return '#22c55e';
    }
    function calcRisk(c){
      const rain = Number(c.rain30_mm ?? c.chirps30_mm ?? 999);
      const anomaly = Number(c.rain_anomaly_pct ?? c.anomali_hujan_pct ?? 0);
      const sm = Number(c.soil_moisture_pct ?? c.smap_pct ?? 999);
      const ndvi = Number(c.ndvi ?? 1);
      const oni = Number(c.oni ?? 0);
      let score = 0;
      if(rain < 50) score += 3; else if(rain < 100) score += 2; else if(rain < 150) score += 1;
      if(anomaly <= -50) score += 3; else if(anomaly <= -30) score += 2; else if(anomaly <= -15) score += 1;
      if(sm < 15) score += 3; else if(sm < 25) score += 2; else if(sm < 35) score += 1;
      if(ndvi < .30) score += 3; else if(ndvi < .45) score += 2; else if(ndvi < .60) score += 1;
      if(oni >= 1.5) score += 2; else if(oni >= .5) score += 1;
      if(score >= 10) return 'KRITIS';
      if(score >= 7) return 'SIAGA';
      if(score >= 4) return 'WASPADA';
      return 'AMAN';
    }

    function buildTable(obj, fields){
      const keys=fields&&fields.length?fields:Object.keys(obj||{});
      const html=(keys||[]).filter(k=>k&&k!=="Kd_Inf").map(k=>{
        const v=obj[k]; if(v==null||v==="")return"";
        return `<tr><td class="key">${k}</td><td>${v}</td></tr>`;
      }).join("");
      return `<table class="meta">${html||'<tr><td>(tidak ada data)</td></tr>'}</table>`;
    }
    function normalizeGas(json){
      if(json&&json.lookup&&json.rows)return json;
      let _rows=Array.isArray(json)?json:(json?.rows||Object.values(json?.lookup||{}));
      const _headers=_rows.length?Object.keys(_rows[0]):[];
      return{rows:_rows,headers:_headers,lookup:Object.fromEntries(_rows.map(r=>[normKey(r.Kd_Inf),r]))};
    }
    function buildFixedGroups(headers){
      return {"__ALL__":headers,"Informasi":headers.slice(1,14),"Area":headers.slice(14,19),"Teknis":headers.slice(19,24),"Saluran Primer":headers.slice(24,33),"Saluran Sekunder":headers.slice(33,40),"Hidrologi":headers.slice(40,42),"Organisasi Petani":headers.slice(42,45),"Manfaat":headers.slice(45,49),"Tanggal Perubahan":headers.slice(49,50)};
    }

    function normalizeClimate(json){
      const out={};
      const meta = json?.meta || json?.metadata || {};
      const global = json?.global || json?.enso || {};
      const arr = Array.isArray(json) ? json : (json.items || json.rows || json.features || []);
      arr.forEach(item=>{
        const p = item.properties || item;
        const key = normKey(p.Kd_Inf || p.KD_INF || p.kd_inf || p.id);
        if(!key) return;
        const c = {
          Kd_Inf:key,
          rain30_mm: Number(p.rain30_mm ?? p.chirps30_mm ?? p.CHIRPS_30D ?? p.hujan30 ?? 0),
          rain_anomaly_pct: Number(p.rain_anomaly_pct ?? p.anomali_hujan_pct ?? p.ANOM_HUJAN ?? 0),
          soil_moisture_pct: Number(p.soil_moisture_pct ?? p.smap_pct ?? p.SMAP ?? 0),
          ndvi: Number(p.ndvi ?? p.NDVI ?? 0),
          oni: Number(p.oni ?? global.oni ?? global.ONI ?? 0),
          enso_status: p.enso_status || global.status || global.enso_status || 'Netral',
          source_date: p.source_date || meta.date || meta.updated || '',
        };
        c.risk = p.risk || p.status_risiko || calcRisk(c);
        out[key]=c;
      });
      return out;
    }

    function makeDemoClimate(){
      // Fallback demo supaya dashboard tetap hidup kalau endpoint iklim belum dipasang.
      // Ganti dengan CLIMATE_API / climate_di_serayu_opak.json untuk produksi.
      const out={};
      diIndex.forEach((d,i)=>{
        const rain = [42,72,115,168,58,91,130][i%7];
        const anomaly = [-62,-41,-22,5,-55,-34,-15][i%7];
        const sm = [13,22,31,44,18,26,35][i%7];
        const ndvi = [0.28,0.39,0.51,0.68,0.33,0.44,0.58][i%7];
        const c={Kd_Inf:d.key,rain30_mm:rain,rain_anomaly_pct:anomaly,soil_moisture_pct:sm,ndvi:ndvi,oni:1.6,enso_status:'El Niño Kuat',source_date:'DEMO'};
        c.risk=calcRisk(c); out[d.key]=c;
      });
      return out;
    }

    async function loadClimate(){
      note('Mengambil data iklim...');
      try{
        let json=null;
        if(CLIMATE_API){
          const r = await fetch(CLIMATE_API + (CLIMATE_API.includes('?')?'&':'?') + 'bbws=' + encodeURIComponent(BBWS_NAME) + '&t=' + Date.now());
          if(r.ok) json=await r.json();
        }else{
          const r = await fetch(PATHS.CLIMATE_LOCAL + '?t=' + Date.now());
          if(r.ok) json=await r.json();
        }
        climateByKey = json ? normalizeClimate(json) : makeDemoClimate();
        if(!Object.keys(climateByKey).length) climateByKey = makeDemoClimate();
        note(Object.values(climateByKey)[0]?.source_date === 'DEMO' ? 'Mode demo iklim aktif. Sambungkan CLIMATE_API atau climate_di_serayu_opak.json untuk data produksi.' : '');
      }catch(e){
        climateByKey = makeDemoClimate();
        note('Mode demo iklim aktif karena endpoint iklim belum tersedia.');
      }
      renderClimateCards();
      refreshDIStyle();
      renderClimateOverlay();
      updateStats();
    }

    function renderClimateCards(){
      const vals = Object.values(climateByKey);
      const counts={AMAN:0,WASPADA:0,SIAGA:0,KRITIS:0}; vals.forEach(v=>counts[v.risk]=(counts[v.risk]||0)+1);
      const sample = vals[0] || {};
      climateCards.innerHTML = `
        <div class="card"><div class="k">ENSO</div><div class="v">${fmt(sample.enso_status)}</div><div class="s">ONI ${fmt(sample.oni)}</div></div>
        <div class="card"><div class="k">CHIRPS</div><div class="v">${fmt(sample.rain30_mm,' mm')}</div><div class="s">contoh hujan 30 hari</div></div>
        <div class="card"><div class="k">SMAP</div><div class="v">${fmt(sample.soil_moisture_pct,'%')}</div><div class="s">contoh kelembaban tanah</div></div>
        <div class="card"><div class="k">Risiko DI</div><div class="v">🔴 ${counts.KRITIS||0} 🟠 ${counts.SIAGA||0}</div><div class="s">🟡 ${counts.WASPADA||0} · 🟢 ${counts.AMAN||0}</div></div>`;
    }

    function climateHtml(key){
      const c = climateByKey[key];
      if(!c) return `<div style="color:#94a3b8;font-size:12px">Data iklim belum tersedia untuk Kd_Inf ini.</div>`;
      return `<table class="meta">
        <tr><td class="key">Status Risiko</td><td><span class="risk-pill ${riskClass(c.risk)}">${c.risk}</span></td></tr>
        <tr><td class="key">ENSO</td><td>${fmt(c.enso_status)} · ONI ${fmt(c.oni)}</td></tr>
        <tr><td class="key">CHIRPS 30 Hari</td><td>${fmt(c.rain30_mm,' mm')}</td></tr>
        <tr><td class="key">Anomali Hujan</td><td>${fmt(c.rain_anomaly_pct,'%')}</td></tr>
        <tr><td class="key">SMAP Soil Moisture</td><td>${fmt(c.soil_moisture_pct,'%')}</td></tr>
        <tr><td class="key">Sentinel-2 NDVI</td><td>${fmt(c.ndvi)}</td></tr>
        <tr><td class="key">Tanggal Data</td><td>${fmt(c.source_date)}</td></tr>
      </table>`;
    }

    function svLink(lat,lng,heading=0,pitch=0,fov=75){return `https://www.google.com/maps/@?${new URLSearchParams({api:1,map_action:'pano',viewpoint:`${lat},${lng}`,heading,pitch,fov}).toString()}`;}
    function addLabel(latlng,text){if(!latlng)return; L.tooltip({permanent:true,direction:'center',className:'di-label'}).setLatLng(latlng).setContent(text).addTo(labelLayer);}

    function renderDetailDI(info,title,key){
      const g=clusterSel.value||"__ALL__";
      const gasTable=(lookup[key]) ? buildTable(info,(g==="__ALL__")?headers:(groups[g]||headers)) : `<div style="color:#cbd5e1;font-size:12px">Data GAS tidak ditemukan.</div>`;
      detailEl.innerHTML=`<h3 style="margin:4px 0;color:#fff">${title}</h3><div style="font-size:11px;color:#cbd5e1;margin-bottom:4px">Kd_Inf: ${key}</div><h4 style="margin:8px 0 4px;color:#fff">Risiko Iklim</h4>${climateHtml(key)}<h4 style="margin:8px 0 4px;color:#fff">Data DI</h4>${gasTable}`;
    }

    function popupDI(title,key,center){
      const lat=center.lat.toFixed(6), lng=center.lng.toFixed(6), svURL=svLink(lat,lng,0,0,75);
      return `<div style="min-width:240px"><div style="font-weight:800;margin-bottom:4px">${title}</div><div style="font-size:12px;color:#64748b;margin-bottom:6px"><div><b>Kd_Inf:</b> ${key||'-'}</div><div><b>Centroid:</b> ${lat}, ${lng}</div></div>${climateHtml(key)}<div style="margin-top:8px"><a href="${svURL}" target="_blank" rel="noopener" style="background:#0ea5e9;color:#fff;padding:6px 10px;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px">Street View DI</a></div></div>`;
    }

    function refreshDIStyle(){
      if(!diLayer) return;
      const selectedRisk = riskSel.value;
      diLayer.eachLayer(layer=>{
        const key = normKey(layer.feature?.properties?.Kd_Inf);
        const c = climateByKey[key];
        const risk = c?.risk || 'AMAN';
        const show = selectedRisk === '__ALL__' || risk === selectedRisk;
        layer.setStyle({color:riskColor(risk),weight:show?2:0.5,fillColor:riskColor(risk),fillOpacity:show?0.45:0.05,opacity:show?1:0.25});
        if(show && layer.bringToFront) layer.bringToFront();
      });
    }

    function renderClimateOverlay(){
      if(climateOverlayLayer){ map.removeLayer(climateOverlayLayer); layerCtl.removeLayer(climateOverlayLayer); }
      if(!diLayer) return;
      climateOverlayLayer = L.layerGroup();
      diIndex.forEach(d=>{
        const c=climateByKey[d.key]; if(!c) return;
        const marker = L.circleMarker(d.center,{radius:7,color:'#0f172a',weight:1,fillColor:riskColor(c.risk),fillOpacity:.95}).bindPopup(`<b>${d.title}</b><br>Status: <span class="risk-pill ${riskClass(c.risk)}">${c.risk}</span><br>CHIRPS: ${fmt(c.rain30_mm,' mm')}<br>SMAP: ${fmt(c.soil_moisture_pct,'%')}<br>NDVI: ${fmt(c.ndvi)}`);
        climateOverlayLayer.addLayer(marker);
      });
      climateOverlayLayer.addTo(map);
      layerCtl.addOverlay(climateOverlayLayer,'Titik Risiko Iklim');
    }

    function updateStats(){
      const diCount=diLayer&&map.hasLayer(diLayer)?diLayer.getLayers().length:0;
      const saluranCount=saluranLayer&&map.hasLayer(saluranLayer)?saluranLayer.getLayers().length:0;
      const bendungCount=bendungLayer&&map.hasLayer(bendungLayer)?bendungLayer.getLayers().length:0;
      const riskCount=Object.keys(climateByKey).length;
      statsEl.innerHTML=`<span>DI</span><b>${diCount}</b><span>Saluran</span><b>${saluranCount}</b><span>Bendung</span><b>${bendungCount}</b><span>Data Iklim</span><b>${riskCount}</b>`;
    }
    function refreshLabelsAndStats(){
      labelLayer.clearLayers();
      if(diIndex.length && diLayer && map.hasLayer(diLayer) && map.getZoom()>=10) diIndex.forEach(o=>addLabel(o.center,o.title));
      updateStats();
    }

    $('dockToggle').addEventListener('click',()=>{const dock=$('dock'); const c=dock.classList.toggle('collapsed'); $('dockToggle').textContent=c?'Tampilkan':'Ciutkan';});
    $('btnRefreshClimate').addEventListener('click', loadClimate);
    riskSel.addEventListener('change', refreshDIStyle);
    clusterSel.addEventListener('change',()=>{const d=diIndex.find(x=>x.title===diSel.value); if(d) renderDetailDI(d.dataObj,d.title,d.key);});
    diSel.addEventListener('change',()=>{
      const val=diSel.value;
      if(!val){ if(diLayer) map.fitBounds(diLayer.getBounds()); return; }
      const d=diIndex.find(x=>x.title===val); if(d){ map.fitBounds(d.layer.getBounds()); d.layer.openPopup(); renderDetailDI(d.dataObj,d.title,d.key); }
    });
    map.on('zoomend',refreshLabelsAndStats);

    const MyLocationControl=L.Control.extend({position:'topright',onAdd:function(){const c=L.DomUtil.create('div','leaflet-bar'); const b=L.DomUtil.create('button','myloc-btn',c); b.type='button';b.innerHTML='📍';b.title='Lokasi saya';L.DomEvent.disableClickPropagation(c);L.DomEvent.on(b,'click',()=>{if(!navigator.geolocation){note('Browser tidak mendukung geolokasi.');return;}note('Mencari lokasi Anda...');navigator.geolocation.getCurrentPosition(pos=>{const latlng=[pos.coords.latitude,pos.coords.longitude], acc=pos.coords.accuracy||0;if(!myLocMarker) myLocMarker=L.marker(latlng).addTo(map).bindPopup('Lokasi saya'); else myLocMarker.setLatLng(latlng); if(acc){if(!myLocCircle) myLocCircle=L.circle(latlng,{radius:acc,color:'#38bdf8',weight:1,fillOpacity:.15}).addTo(map); else {myLocCircle.setLatLng(latlng);myLocCircle.setRadius(acc);}} map.setView(latlng,Math.max(map.getZoom(),15));note('');myLocMarker.openPopup();},err=>note('Gagal mendapatkan lokasi: '+err.message),{enableHighAccuracy:true,timeout:10000,maximumAge:0});});return c;}}); map.addControl(new MyLocationControl());

    const SourceControl=L.Control.extend({position:'bottomleft',onAdd:function(){const c=L.DomUtil.create('div','source-panel'); c.innerHTML=`<b>Sumber Iklim</b><div class="item"><a target="_blank" rel="noopener" href="${SOURCE_LINKS.bmkg}" style="color:#93c5fd">BMKG ENSO</a></div><div class="item"><a target="_blank" rel="noopener" href="${SOURCE_LINKS.noaaOni}" style="color:#93c5fd">NOAA ONI</a></div><div class="item"><a target="_blank" rel="noopener" href="${SOURCE_LINKS.chirps}" style="color:#93c5fd">CHIRPS</a></div><div class="item"><a target="_blank" rel="noopener" href="${SOURCE_LINKS.smap}" style="color:#93c5fd">NASA SMAP</a></div>`;L.DomEvent.disableClickPropagation(c);return c;}}); map.addControl(new SourceControl());

    const LegendControl=L.Control.extend({position:'topright',onAdd:function(){const c=L.DomUtil.create('div','layer-legend'); c.innerHTML=`<b>Legenda</b><div class="item"><span class="swatch" style="background:#22c55e"></span>Aman</div><div class="item"><span class="swatch" style="background:#facc15"></span>Waspada</div><div class="item"><span class="swatch" style="background:#f97316"></span>Siaga</div><div class="item"><span class="swatch" style="background:#dc2626"></span>Kritis</div><hr style="border:none;border-top:1px solid rgba(255,255,255,.12)"><div class="item"><span class="swatch swatch-saluran"></span>Saluran</div><div class="item"><span class="swatch swatch-bendung"></span>Bendung</div>`;L.DomEvent.disableClickPropagation(c);return c;}}); map.addControl(new LegendControl());

    function bindUploadedPopup(f,l){
      const p=f.properties||{}; const title=p["Nama Aset"]||p["NAMA_ASET"]||p.nama||p.Name||p.NAMOBJ||"Fitur";
      let lat=null,lng=null; if(f.geometry?.type==='Point'&&Array.isArray(f.geometry.coordinates)){lng=f.geometry.coordinates[0];lat=f.geometry.coordinates[1];}
      if(p.latitude!=null&&p.longitude!=null){lat=Number(p.latitude);lng=Number(p.longitude);}
      let rows=[]; ["Nama Aset","NAMA_ASET","Kd_Inf","Sungai","sungai","Daerah Irigasi","Kabupaten","Provinsi"].forEach(k=>{if(p[k]!==undefined&&p[k]!==null&&p[k]!=="") rows.push(`<tr><td style="padding:2px 4px;color:#64748b">${k}</td><td style="padding:2px 4px">${p[k]}</td></tr>`)});
      let coordRow='', svButtons=''; if(lat!=null&&lng!=null&&!Number.isNaN(lat)&&!Number.isNaN(lng)){const la=lat.toFixed(6), ln=lng.toFixed(6); coordRow=`<tr><td style="padding:2px 4px;color:#64748b">Koordinat</td><td style="padding:2px 4px">${la}, ${ln}</td></tr>`; svButtons=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><a href="${svLink(la,ln,0,0,75)}" target="_blank" rel="noopener" style="background:#0ea5e9;color:#fff;padding:6px 10px;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px">Buka Street View</a><a href="https://www.google.com/maps/search/?api=1&query=${la},${ln}" target="_blank" rel="noopener" style="background:#111827;color:#fff;padding:6px 10px;border-radius:8px;text-decoration:none;font-weight:700;font-size:12px">Google Maps</a></div>`;}
      l.bindPopup(`<div style="min-width:220px"><div style="font-weight:800;margin-bottom:4px">${title}</div><table style="border-collapse:collapse;font-size:12px;margin-top:4px">${rows.join('')}${coordRow}</table>${svButtons}</div>`);
    }
    function createUploadedLayer(gj){return L.geoJSON(gj,{interactive:true,style:()=>({color:'#e11d48',weight:2,fillOpacity:.2}),pointToLayer:(f,latlng)=>L.circleMarker(latlng,{radius:5,weight:1,color:'#e11d48',fillColor:'#fb7185',fillOpacity:.9,interactive:true}),onEachFeature:(f,l)=>bindUploadedPopup(f,l)});}
    function renderGeoFromObject(gj,meta,zoomOnLoad){if(!meta?.id)return; const prev=savedLayers[meta.id]; if(prev){map.removeLayer(prev);layerCtl.removeLayer(prev);} const layer=createUploadedLayer(gj).addTo(map); savedLayers[meta.id]=layer; layerCtl.addOverlay(layer,meta.name); if(zoomOnLoad){try{map.fitBounds(layer.getBounds());}catch(e){}}}

    if(uploadBtn){uploadBtn.addEventListener('click',()=>{uploadMsg.style.color='#e5e7eb';uploadMsg.textContent=''; const file=uploadInput.files[0]; if(!file){uploadMsg.style.color='#f87171';uploadMsg.textContent='Pilih dulu file GeoJSON / JSON.';return;} const reader=new FileReader(); reader.onload=async(evt)=>{const content=evt.target.result; const payload={filename:file.name,mimeType:file.type||'application/json',content,bbwsName:BBWS_NAME}; uploadMsg.textContent='Mengunggah & menyimpan ke Drive...'; try{const res=await fetch(UPLOAD_URL,{method:'POST',body:JSON.stringify(payload)}); const text=await res.text(); let data=null; try{data=JSON.parse(text)}catch(e){} if(!res.ok||!data){uploadMsg.style.color='#f87171';uploadMsg.textContent='Upload gagal: '+(res.statusText||'respons tidak valid');return;} if(data.ok){const meta={id:data.id||('local-'+Date.now()),name:data.name||file.name,webViewLink:data.webViewLink||''}; savedFilesMeta.push(meta); renderUploadList(savedFilesMeta); uploadMsg.style.color='#4ade80'; uploadMsg.innerHTML='Berhasil tersimpan di folder <b>'+(data.folderName||BBWS_NAME)+'</b>.'; try{renderGeoFromObject(JSON.parse(content),meta,true)}catch(e){}} else {uploadMsg.style.color='#f97316'; uploadMsg.textContent='Server error: '+(data.error||'tidak diketahui');}}catch(err){uploadMsg.style.color='#f87171'; uploadMsg.textContent='Gagal menghubungi server upload: '+err;}}; reader.readAsText(file);});}
    async function loadSavedList(){try{const res=await fetch(UPLOAD_URL+'?action=list&bbws='+encodeURIComponent(BBWS_NAME)); if(!res.ok){uploadListEl.innerHTML='<div style="color:#f97316;font-size:11px">Gagal memuat daftar GeoJSON.</div>';return;} const data=await res.json(); if(!data.ok){uploadListEl.innerHTML='<div style="color:#f97316;font-size:11px">Server error saat list GeoJSON.</div>';return;} savedFilesMeta=data.items||[]; renderUploadList(savedFilesMeta); for(const item of savedFilesMeta) await loadFileLayer(item,false);}catch(e){uploadListEl.innerHTML='<div style="color:#f97316;font-size:11px">Tidak bisa terhubung ke server list GeoJSON.</div>';}}
    function renderUploadList(items){uploadListEl.innerHTML=''; if(!items?.length){uploadListEl.innerHTML='<div style="color:#94a3b8;font-size:11px">Belum ada GeoJSON tersimpan.</div>';return;} items.forEach(item=>{const row=document.createElement('div'); row.className='upload-item'; const name=document.createElement('div'); name.className='upload-name'; name.textContent='• '+item.name; row.appendChild(name); const show=document.createElement('button'); show.className='btn-mini'; show.textContent='Tampil'; show.onclick=()=>loadFileLayer(item,true); row.appendChild(show); const del=document.createElement('button'); del.className='btn-mini danger'; del.textContent='Hapus'; del.onclick=()=>deleteFile(item); row.appendChild(del); uploadListEl.appendChild(row);});}
    async function loadFileLayer(item,zoomOnLoad){try{if(savedLayers[item.id]){const layer=savedLayers[item.id]; if(!map.hasLayer(layer))map.addLayer(layer); if(zoomOnLoad)try{map.fitBounds(layer.getBounds())}catch(e){} return;} const res=await fetch(UPLOAD_URL+'?action=geojson&id='+encodeURIComponent(item.id)); if(!res.ok)return; renderGeoFromObject(await res.json(),item,zoomOnLoad);}catch(e){console.error(e)}}
    async function deleteFile(item){if(!confirm('Hapus file "'+item.name+'" dari Google Drive dan peta?'))return; uploadMsg.style.color='#e5e7eb'; uploadMsg.textContent='Menghapus '+item.name+'...'; try{const res=await fetch(UPLOAD_URL,{method:'POST',body:JSON.stringify({action:'delete',id:item.id})}); const data=await res.json(); if(!res.ok||!data.ok) throw new Error(data?.error||'delete gagal'); const layer=savedLayers[item.id]; if(layer){map.removeLayer(layer);layerCtl.removeLayer(layer);delete savedLayers[item.id];} savedFilesMeta=savedFilesMeta.filter(f=>f.id!==item.id); renderUploadList(savedFilesMeta); uploadMsg.style.color='#4ade80'; uploadMsg.textContent='Berhasil dihapus.';}catch(err){uploadMsg.style.color='#f87171'; uploadMsg.textContent='Gagal menghapus: '+err.message;}}

    Promise.allSettled([fetch(GAS_URL).then(r=>r.json()), fetch(PATHS.DI).then(r=>r.json()), fetch(PATHS.SALURAN).then(r=>r.json()), fetch(PATHS.BENDUNG).then(r=>r.json())]).then(async results=>{
      const [gasRes,diRes,salRes,bendungRes]=results;
      if(gasRes.status==='fulfilled'){
        const norm=normalizeGas(gasRes.value); lookup=norm.lookup; rows=norm.rows; headers=norm.headers; groups=buildFixedGroups(headers);
        Object.keys(groups).filter(k=>k!=='__ALL__').forEach(k=>clusterSel.insertAdjacentHTML('beforeend',`<option value="${k}">${k}</option>`));
        [...new Set(rows.map(r=>getNamaDI(r)).filter(Boolean))].sort().forEach(nm=>diSel.insertAdjacentHTML('beforeend',`<option value="${nm}">${nm}</option>`));
      }
      if(diRes.status==='fulfilled'){
        const fc={type:'FeatureCollection',features:diRes.value?.features||[]};
        diLayer=L.geoJSON(fc,{pane:'diPane',interactive:true,style:()=>({color:'#1d5fd1',weight:1,fillColor:'#3388ff',fillOpacity:.30}),onEachFeature:(f,layer)=>{
          const key=normKey(f.properties?.Kd_Inf); const info=lookup[key]||{}; const title=getNamaDI(info)||key||'DI'; const center=layer.getBounds().getCenter();
          diIndex.push({layer,key,title,nama:title.toLowerCase(),dataObj:info,center});
          layer.bindPopup(()=>popupDI(title,key,center));
          layer.on('click',()=>{renderDetailDI(info,title,key); layer.bringToFront();});
        }}).addTo(map); layerCtl.addOverlay(diLayer,'DI Risiko Iklim'); if(diLayer.getLayers().length) map.fitBounds(diLayer.getBounds());
      }
      if(salRes.status==='fulfilled'){
        saluranLayer=L.geoJSON({type:'FeatureCollection',features:salRes.value?.features||[]},{pane:'saluranPane',interactive:true,style:()=>({color:'#10b981',weight:2,opacity:.95}),onEachFeature:(f,layer)=>{const p=f.properties||{}; const nm=p.nama||p.NAMA||p.NM_SALURAN||p.Name||'Saluran'; const kd=p.Kd_Inf||p.KD_INF||'-'; const center=layer.getBounds().getCenter(); layer.bindPopup(`<b>${nm}</b><br>Kd_Inf: ${kd}<br>${center.lat.toFixed(6)}, ${center.lng.toFixed(6)}`);}}).addTo(map); layerCtl.addOverlay(saluranLayer,'Saluran'); saluranLayer.bringToFront();
      }
      const bendungData=(bendungRes.status==='fulfilled'&&bendungRes.value)?bendungRes.value:BENDUNG_SAMPLE;
      bendungLayer=L.geoJSON(bendungData,{pane:'bendungPane',interactive:true,pointToLayer:(f,latlng)=>L.circleMarker(latlng,{radius:6,weight:2,opacity:1,fillOpacity:.9,color:'#f59e0b',fillColor:'#f59e0b',interactive:true}),onEachFeature:(f,l)=>{const p=f.properties||{}; const nm=p['Nama Aset']||p.NAMA_ASET||p.nama||p.Name||'Bendung'; const kd=p.Kd_Inf||p.KD_INF||'-'; const lat=l.getLatLng().lat.toFixed(6), lng=l.getLatLng().lng.toFixed(6); l.bindPopup(`<b>${nm}</b><br>Kd_Inf: ${kd}<br>${lat}, ${lng}<br><a target="_blank" rel="noopener" href="${svLink(lat,lng,0,0,75)}">Street View</a>`);}}).addTo(map); layerCtl.addOverlay(bendungLayer,'Bendung'); bendungLayer.bringToFront();
      detailEl.innerHTML='<i style="color:#cbd5e1">Klik DI untuk melihat data GAS + CHIRPS + SMAP + NDVI + ENSO. Jika endpoint iklim belum ada, sistem memakai data demo.</i>';
      refreshLabelsAndStats();
      await loadClimate();
      loadSavedList();
    });
  });
  </script>
</body>
</html>
