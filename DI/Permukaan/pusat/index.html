<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PMTiles Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto}
#map{height:100%;width:100%}

.header{
  position:absolute;top:0;left:0;right:0;z-index:1000;
  background:#0b4fa3;color:#fff;padding:14px 24px;
  box-shadow:0 4px 18px rgba(0,0,0,.3)
}
.header h1{margin:0;font-size:18px}
.header div{font-size:14px}

.panel{
  position:absolute;z-index:999;top:100px;left:12px;
  background:#0f172aee;color:#e5e7eb;
  border-radius:14px;padding:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  min-width:280px
}
.row{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:13px;font-weight:700}
.dot{width:12px;height:12px;border-radius:50%}
.baku{background:#38bdf8}
.pots{background:#f59e0b}
.fung{background:#10b981}
.admin{background:#ffffff}

#loading{
  position:absolute;z-index:2000;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(15,23,42,.55);color:#fff;
  font-size:20px;font-weight:800
}
</style>
</head>

<body>
<div id="map"></div>

<div class="header">
  <h1>KEMENTERIAN PEKERJAAN UMUM</h1>
  <div>Direktorat Jenderal Sumber Daya Air</div>
  <div>Direktorat Irigasi & Rawa</div>
</div>

<div class="panel">
  <label class="row"><span class="dot baku"></span><input type="checkbox" checked id="baku">BAKU</label>
  <label class="row"><span class="dot pots"></span><input type="checkbox" checked id="pots">POTENSIAL</label>
  <label class="row"><span class="dot fung"></span><input type="checkbox" checked id="fung">FUNGSIONAL</label>
  <label class="row"><span class="dot admin"></span><input type="checkbox" checked id="admin">BATAS PROVINSI</label>
</div>

<div id="loading">Loading data...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/pmtiles@3.0.7/dist/pmtiles.js"></script>
<script src="https://unpkg.com/protomaps-leaflet@4.0.1/dist/protomaps-leaflet.js"></script>

<script>
const map = L.map("map",{preferCanvas:true,maxZoom:18}).setView([-2.5,118],5);

L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {maxZoom:18, attribution:"Tiles © Esri"}
).addTo(map);

const groups = {
  BAKU: L.layerGroup().addTo(map),
  POTENSIAL: L.layerGroup().addTo(map),
  FUNGSIONAL: L.layerGroup().addTo(map),
  ADMIN: L.layerGroup().addTo(map)
};

function normalizeCategory(cat){
  cat = String(cat || "").toUpperCase();
  if(cat === "BAKU") return "BAKU";
  if(cat === "POTS" || cat === "POTENSIAL") return "POTENSIAL";
  if(cat === "FUNG" || cat === "FUNGSIONAL") return "FUNGSIONAL";
  if(cat === "ADMIN") return "ADMIN";
  return null;
}

function color(cat){
  if(cat==="BAKU") return "rgba(56,189,248,.38)";
  if(cat==="POTENSIAL") return "rgba(245,158,11,.38)";
  if(cat==="FUNGSIONAL") return "rgba(16,185,129,.38)";
  if(cat==="ADMIN") return "rgba(255,255,255,.85)";
  return "rgba(0,200,255,.35)";
}

function rules(vectorLayers, cat){
  return vectorLayers.map(layerName => ({
    dataLayer: layerName,
    symbolizer: cat==="ADMIN"
      ? new protomapsL.LineSymbolizer({
          color: color(cat),
          width: 2
        })
      : new protomapsL.PolygonSymbolizer({
          fill: color(cat),
          stroke: "rgba(0,0,0,0)",
          width: 0
        })
  }));
}

async function loadData(){
  try{
    const res = await fetch("manifest.json?v=" + Date.now(), {cache:"no-store"});
    const manifest = await res.json();
    const items = manifest.layers || [];

    let total = 0;

    for(const item of items){
      const file = item.file;
      const cat = normalizeCategory(item.category);

      if(!file || !cat || !groups[cat]) continue;

      try{
        const pm = new pmtiles.PMTiles(file);
        pmtiles.addProtocol("pmtiles", pm);

        const header = await pm.getHeader();
        const meta = await pm.getMetadata();
        const vectorLayers = (meta.vector_layers || []).map(v => v.id);

        if(!vectorLayers.length){
          console.warn("vector_layers kosong:", file);
          continue;
        }

        const layer = protomapsL.leafletLayer({
          url: "pmtiles://" + file,
          paint_rules: rules(vectorLayers, cat),
          label_rules: [],
          maxDataZoom: header.maxZoom || 18
        });

        layer.addTo(groups[cat]);
        total++;

      }catch(err){
        console.warn("Gagal load:", file, err);
      }
    }

    console.log("Total layer berhasil:", total);
    document.getElementById("loading").style.display="none";

  }catch(err){
    console.error(err);
    document.getElementById("loading").textContent = "Gagal load manifest.json";
  }
}

loadData();

baku.onchange = ()=> baku.checked ? map.addLayer(groups.BAKU) : map.removeLayer(groups.BAKU);
pots.onchange = ()=> pots.checked ? map.addLayer(groups.POTENSIAL) : map.removeLayer(groups.POTENSIAL);
fung.onchange = ()=> fung.checked ? map.addLayer(groups.FUNGSIONAL) : map.removeLayer(groups.FUNGSIONAL);
admin.onchange = ()=> admin.checked ? map.addLayer(groups.ADMIN) : map.removeLayer(groups.ADMIN);
</script>
</body>
</html>
